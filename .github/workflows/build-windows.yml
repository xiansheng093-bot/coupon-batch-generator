name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate example files
        run: python coupon_web.py --create-examples

      - name: Build EXE with PyInstaller
        run: pyinstaller --clean coupon_web.spec

      - name: Prepare distribution
        shell: bash
        run: |
          DIST_DIR="dist/优惠券批量生成器"
          cp -f 券码示例.xlsx "$DIST_DIR/" 2>/dev/null || true
          cp -f 模板示例.png "$DIST_DIR/" 2>/dev/null || true
          cp -f 使用说明.txt "$DIST_DIR/"

      - name: Create ZIP archive
        shell: pwsh
        run: Compress-Archive -Path "dist/优惠券批量生成器" -DestinationPath "dist/优惠券批量生成器-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coupon-batch-generator-windows
          path: dist/优惠券批量生成器-Windows.zip
          retention-days: 30
