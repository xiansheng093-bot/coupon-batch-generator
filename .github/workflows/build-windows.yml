name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate example files
        run: python coupon_web.py --create-examples

      - name: Build EXE with PyInstaller
        run: pyinstaller --clean coupon_web.spec

      - name: Prepare distribution
        shell: bash
        run: |
          DIST_DIR="dist/优惠券批量生成器"
          cp -f 券码示例.xlsx "$DIST_DIR/" 2>/dev/null || true
          cp -f 模板示例.png "$DIST_DIR/" 2>/dev/null || true
          cat > "$DIST_DIR/使用说明.txt" << 'READMEEOF'
          优惠券批量生成器 / Coupon Batch Generator
          ==========================================

          使用方法:
            1. 双击 "优惠券批量生成器.exe" 启动服务
            2. 浏览器会自动打开 http://localhost:8888
            3. 按 Ctrl+C 或关闭命令行窗口停止服务

          操作流程:
            1. 上传 Excel 券码文件（支持 .xlsx/.xls/.csv）
            2. 选择券码所在列（A-E）
            3. 上传模板图片（支持 PNG/JPG/BMP）
            4. 在预览中拖拽调整二维码和文字位置
            5. 点击 "生成 PDF" 下载多页 PDF

          注意: 如果浏览器未自动打开，请手动访问 http://localhost:8888
          READMEEOF

      - name: Create ZIP archive
        shell: pwsh
        run: Compress-Archive -Path "dist/优惠券批量生成器" -DestinationPath "dist/优惠券批量生成器-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coupon-batch-generator-windows
          path: dist/优惠券批量生成器-Windows.zip
          retention-days: 30
